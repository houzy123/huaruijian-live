<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>华瑞健定向 - 赛事照片直播</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d7a3e;
            --primary-dark: #1e5a2a;
            --primary-light: #e8f5e9;
            --accent: #f5a623;
            --text: #1a1a1a;
            --text-secondary: #666;
            --text-muted: #999;
            --bg: #f5f7f4;
            --card-bg: #ffffff;
            --border: #e8e8e8;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #1e5a2a 0%, #2d7a3e 50%, #3d9a52 100%);
            padding: 40px 20px 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
        }

        .hero h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }

        .hero .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.75);
            font-weight: 300;
            margin-bottom: 20px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .hero-badge .dot {
            width: 8px;
            height: 8px;
            background: #7ee787;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: var(--card-bg);
            margin: -25px 16px 0;
            border-radius: 16px;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 2;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Filter Section */
        .filter-section {
            padding: 24px 16px 12px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .filter-section::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .filter-btn:not(.active):active {
            background: var(--primary-light);
        }

        /* Event List */
        .event-list {
            padding: 12px 16px 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .year-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0 4px;
            padding: 0 4px;
        }

        .year-divider::before,
        .year-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .year-divider span {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 0 8px;
        }

        /* Event Card */
        .event-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .event-card:active {
            transform: scale(0.98);
        }

        .event-card-header {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .event-card-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .event-card:active .event-card-header img {
            transform: scale(1.05);
        }

        .event-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 16px 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
        }

        .event-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .event-status.live {
            background: #ff4444;
            color: #fff;
        }

        .event-status.past {
            background: rgba(255,255,255,0.25);
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .event-title-overlay {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .event-card-body {
            padding: 14px 16px 16px;
        }

        .event-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .photo-count {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .enter-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            background: var(--primary);
            color: #fff;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .enter-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            display: none;
        }

        .empty-state.show {
            display: block;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            color: var(--primary);
        }

        .empty-title {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid var(--border);
        }

        .footer-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .footer-logo svg {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        .footer-logo span {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .footer p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer .powered {
            margin-top: 8px;
            font-size: 11px;
            color: #bbb;
        }

        /* Loading animation */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Hide skeletons after load */
        .loaded .skeleton {
            display: none;
        }

        /* Bottom safe area for mobile */
        .safe-bottom {
            height: env(safe-area-inset-bottom, 20px);
            min-height: 20px;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="white" fill-opacity="0.9"/>
                    <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill-opacity="0.6"/>
                    <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill-opacity="0.6"/>
                </svg>
            </div>
            <h1>华瑞健定向</h1>
            <p class="subtitle">赛事照片直播中心</p>
            <div class="hero-badge">
                <span class="dot"></span>
                拍立享云相册
            </div>
        </div>
    </section>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-number" id="totalEvents">0</div>
            <div class="stat-label">场赛事</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalPhotos">0</div>
            <div class="stat-label">张照片</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalYears">0</div>
            <div class="stat-label">年历程</div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filter-section" id="filterSection">
        <button class="filter-btn active" data-filter="all">全部赛事</button>
        <button class="filter-btn" data-filter="2025">2025年</button>
        <button class="filter-btn" data-filter="2024">2024年</button>
        <button class="filter-btn" data-filter="2023">2023年</button>
    </div>

    <!-- Event List -->
    <div class="event-list" id="eventList">
        <!-- Events will be rendered here -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
        <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
            </svg>
        </div>
        <div class="empty-title">暂无该年份的赛事</div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>华瑞健定向</span>
        </div>
        <p>记录每一次奔跑的精彩瞬间</p>
        <p class="powered">Powered by 拍立享照片直播</p>
    </footer>

    <div class="safe-bottom"></div>

    <script>
        // ============================================================
        // 赛事数据配置区 - 在此添加/修改赛事信息
        // 每场赛事对应一个拍立享云相册链接
        // ============================================================
        const events = [
            {
                id: 1,
                name: "2025年深圳市定向越野锦标赛",
                date: "2025-06-15",
                dateDisplay: "2025年6月15日",
                location: "深圳市·莲花山公园",
                cover: "https://images.unsplash.com/photo-1552674605-46d536d212f3?w=600&h=400&fit=crop",
                albumUrl: "https://live.pailixiang.com/xxxxxxx1",  // 替换为拍立享相册链接
                photoCount: "2,380",
                status: "past",  // "live" 或 "past"
                year: "2025"
            },
            {
                id: 2,
                name: "2025华瑞健定向春季赛",
                date: "2025-04-20",
                dateDisplay: "2025年4月20日",
                location: "深圳市·大沙河公园",
                cover: "https://images.unsplash.com/photo-1547483238-f400e65ccd56?w=600&h=400&fit=crop",
                albumUrl: "https://live.pailixiang.com/xxxxxxx2",  // 替换为拍立享相册链接
                photoCount: "1,856",
                status: "past",
                year: "2025"
            },
            {
                id: 3,
                name: "2024年南粤定向嘉年华",
                date: "2024-11-10",
                dateDisplay: "2024年11月10日",
                location: "广州市·白云山",
                cover: "https://images.unsplash.com/photo-1533240332313-0db49b459ad6?w=600&h=400&fit=crop",
                albumUrl: "https://live.pailixiang.com/xxxxxxx3",
                photoCount: "3,124",
                status: "past",
                year: "2024"
            },
            {
                id: 4,
                name: "2024华瑞健定向秋季赛",
                date: "2024-09-28",
                dateDisplay: "2024年9月28日",
                location: "深圳市·深圳湾公园",
                cover: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&h=400&fit=crop",
                albumUrl: "https://live.pailixiang.com/xxxxxxx4",
                photoCount: "2,567",
                status: "past",
                year: "2024"
            },
            {
                id: 5,
                name: "2024年粤港澳大湾区定向赛",
                date: "2024-07-13",
                dateDisplay: "2024年7月13日",
                location: "东莞市·松山湖",
                cover: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=400&fit=crop",
                albumUrl: "https://live.pailixiang.com/xxxxxxx5",
                photoCount: "4,210",
                status: "past",
                year: "2024"
            },
            {
                id: 6,
                name: "2024华瑞健定向春季赛",
                date: "2024-04-14",
                dateDisplay: "2024年4月14日",
                location: "深圳市·中心公园",
                cover: "https://images.unsplash.com/photo-1476973422084-e0fa66ff9456?w=600&h=400&fit=crop",
                albumUrl: "https://live.pailixiang.com/xxxxxxx6",
                photoCount: "1,943",
                status: "past",
                year: "2024"
            },
            {
                id: 7,
                name: "2023年广东省定向越野冠军赛",
                date: "2023-12-03",
                dateDisplay: "2023年12月3日",
                location: "惠州市·红花湖",
                cover: "https://images.unsplash.com/photo-1511497584788-876760111969?w=600&h=400&fit=crop",
                albumUrl: "https://live.pailixiang.com/xxxxxxx7",
                photoCount: "3,876",
                status: "past",
                year: "2023"
            },
            {
                id: 8,
                name: "2023华瑞健定向年终总决赛",
                date: "2023-10-22",
                dateDisplay: "2023年10月22日",
                location: "深圳市·梧桐山",
                cover: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&h=400&fit=crop",
                albumUrl: "https://live.pailixiang.com/xxxxxxx8",
                photoCount: "2,654",
                status: "past",
                year: "2023"
            }
        ];
        // ============================================================

        // Render events
        function renderEvents(filterYear = 'all') {
            const container = document.getElementById('eventList');
            const emptyState = document.getElementById('emptyState');
            
            let filtered = events;
            if (filterYear !== 'all') {
                filtered = events.filter(e => e.year === filterYear);
            }

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.add('show');
                return;
            }
            emptyState.classList.remove('show');

            // Group by year
            const grouped = filtered.reduce((acc, event) => {
                if (!acc[event.year]) acc[event.year] = [];
                acc[event.year].push(event);
                return acc;
            }, {});

            let html = '';
            const sortedYears = Object.keys(grouped).sort((a, b) => b - a);
            
            sortedYears.forEach(year => {
                const yearEvents = grouped[year].sort((a, b) => new Date(b.date) - new Date(a.date));
                
                html += `
                    <div class="year-divider">
                        <span>${year}年</span>
                    </div>
                `;
                
                yearEvents.forEach(event => {
                    html += `
                        <a href="${event.albumUrl}" class="event-card" target="_blank" rel="noopener noreferrer">
                            <div class="event-card-header">
                                <img src="${event.cover}" alt="${event.name}" loading="lazy">
                                <div class="event-overlay">
                                    <span class="event-status ${event.status}">${event.status === 'live' ? '● 正在直播' : '已结束'}</span>
                                    <div class="event-title-overlay">${event.name}</div>
                                </div>
                            </div>
                            <div class="event-card-body">
                                <div class="event-meta">
                                    <span class="meta-item">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="3" y="4" width="18" height="18" rx="2"/>
                                            <path d="M16 2v4M8 2v4M3 10h18"/>
                                        </svg>
                                        ${event.dateDisplay}
                                    </span>
                                    <span class="meta-item">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                            <circle cx="12" cy="10" r="3"/>
                                        </svg>
                                        ${event.location}
                                    </span>
                                </div>
                                <div class="event-footer">
                                    <span class="photo-count">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                                            <circle cx="8.5" cy="8.5" r="1.5"/>
                                            <path d="M21 15l-5-5L5 21"/>
                                        </svg>
                                        ${event.photoCount} 张照片
                                    </span>
                                    <span class="enter-btn">
                                        进入相册
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                            <path d="M5 12h14M12 5l7 7-7 7"/>
                                        </svg>
                                    </span>
                                </div>
                            </div>
                        </a>
                    `;
                });
            });

            container.innerHTML = html;
        }

        // Update stats
        function updateStats() {
            const totalEvents = events.length;
            const totalPhotos = events.reduce((sum, e) => {
                return sum + parseInt(e.photoCount.replace(/,/g, ''));
            }, 0);
            const years = new Set(events.map(e => e.year));
            
            document.getElementById('totalEvents').textContent = totalEvents;
            document.getElementById('totalPhotos').textContent = (totalPhotos / 10000).toFixed(1) + '万';
            document.getElementById('totalYears').textContent = years.size;
        }

        // Filter buttons
        document.getElementById('filterSection').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                renderEvents(e.target.dataset.filter);
            }
        });

        // Initialize
        renderEvents();
        updateStats();

        // WeChat sharing optimization
        document.addEventListener('WeixinJSBridgeReady', function() {
            // Will be called if WeChat JS Bridge is available
        }, false);
    </script>
</body>
</html>
